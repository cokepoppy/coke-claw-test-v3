apiVersion: apps/v1
kind: Deployment
metadata:
  name: coke-claw-test-v3-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coke-claw-test-v3-backend
  template:
    metadata:
      labels:
        app: coke-claw-test-v3-backend
    spec:
      containers:
        - name: backend
          image: ${BACKEND_IMAGE_REF}
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: coke-claw-test-v3-backend
spec:
  selector:
    app: coke-claw-test-v3-backend
  ports:
    - port: 8080
      targetPort: 8080

