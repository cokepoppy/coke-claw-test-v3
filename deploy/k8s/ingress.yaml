apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: coke-claw-test-v3-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: coke-claw-test-v3.claw.coke-twitter.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: coke-claw-test-v3-frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: coke-claw-test-v3-backend
                port:
                  number: 8080

